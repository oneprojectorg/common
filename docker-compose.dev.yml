name: op-${PORT_PREFIX:-31}

services:
  # ── Docker-in-Docker daemon ───────────────────────────────────────────────────
  # Supabase CLI spawns its own containers (Postgres, Auth, Storage, etc.).
  # By pointing it at this private daemon instead of the host socket, each
  # compose instance is fully isolated — multiple stacks can run simultaneously
  # without port conflicts.
  dind:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      # Expose Supabase API to the host for browser access (supabase-js client).
      # Port prefix matches PORT_PREFIX so multiple instances don't conflict.
      - "${PORT_PREFIX:-31}21:54321"
      # Expose Supabase inbucket (email) for local dev inspection.
      - "${PORT_PREFIX:-31}24:54324"
      # Expose Postgres directly for local dev tools (e.g. TablePlus, psql).
      - "${PORT_PREFIX:-31}22:54322"
    volumes:
      # Persist the DinD image cache across restarts so Supabase images
      # (postgres, kong, gotrue, studio, etc.) are not re-pulled every time.
      - dind_storage:/var/lib/docker
    networks:
      - op-dev

  # ── Next.js frontend ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - tiptap_token
    command: sh -c "pnpm install --frozen-lockfile && pnpm -C packages/styles build && pnpm w:app dev"
    env_file: .env.docker
    environment:
      TIPTAP_PRO_TOKEN: ${TIPTAP_PRO_TOKEN}
      NEXT_PUBLIC_API_PORT: "${PORT_PREFIX:-31}01"
      NEXT_PUBLIC_SUPABASE_URL: "http://localhost:${PORT_PREFIX:-31}21"
      WATCHPACK_POLLING: "true"
    ports:
      - "${PORT_PREFIX:-31}00:3100"
    volumes:
      # Bind-mount the repo root for hot-reload
      - .:/app
      # Isolated node_modules — not overwritten by the bind mount above
      - app_node_modules:/app/node_modules
      # Next.js build cache
      - app_next:/app/apps/app/.next
    networks:
      - op-dev
    depends_on:
      - redis
      - supabase

  # ── tRPC API server ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - tiptap_token
    command: sh -c "pnpm install --frozen-lockfile && pnpm w:db migrate && /app/node_modules/.bin/tsx services/db/seed-access-control.ts && pnpm -C ./apps/api dev"
    env_file: .env.docker
    environment:
      TIPTAP_PRO_TOKEN: ${TIPTAP_PRO_TOKEN}
      WATCHPACK_POLLING: "true"
    ports:
      - "${PORT_PREFIX:-31}01:3300"
    volumes:
      # Bind-mount the repo root for hot-reload
      - .:/app
      # Isolated node_modules
      - api_node_modules:/app/node_modules
      # Next.js build cache
      - api_next:/app/apps/api/.next
    networks:
      - op-dev
    depends_on:
      redis:
        condition: service_started
      supabase:
        condition: service_completed_successfully

  # ── Supabase local stack ─────────────────────────────────────────────────────
  # Runs `supabase start` against the private DinD daemon so all Supabase
  # sub-containers are isolated inside this stack. No host ports are exposed.
  supabase:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - tiptap_token
    command: sh -c "supabase stop --workdir /app/supabase --no-backup 2>/dev/null || true; supabase start --workdir /app/supabase"
    env_file: .env.docker
    environment:
      DOCKER_HOST: tcp://dind:2375
    networks:
      - op-dev
    depends_on:
      dind:
        condition: service_healthy

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    networks:
      - op-dev

networks:
  op-dev:
    driver: bridge

volumes:
  app_node_modules:
  api_node_modules:
  app_next:
  api_next:
  dind_storage:

secrets:
  tiptap_token:
    environment: TIPTAP_PRO_TOKEN
