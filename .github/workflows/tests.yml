name: Tests

on:
  pull_request:

jobs:
  test:
    name: Tests
    runs-on: blacksmith-2vcpu-ubuntu-2204

    env:
      # Tiptap Pro registry authentication
      TIPTAP_PRO_TOKEN: ${{ secrets.TIPTAP_PRO_TOKEN }}
      # Static env vars (Supabase keys are set dynamically after `supabase start`)
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:55321
      SUPABASE_URL: http://127.0.0.1:55321
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:55322/postgres
      NEXT_PUBLIC_POSTHOG_KEY: test_posthog_key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Enable Corepack
        run: corepack enable

      - name: Install pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.2

      - name: Use CI config
        run: cp supabase/supabase-ci.toml supabase/config.toml

      - name: Start Supabase
        run: |
          echo "Starting Supabase with CI config..."
          supabase start
          echo "Supabase started successfully"

      - name: Check Supabase status
        run: supabase status

      - name: Export Supabase auth keys
        run: |
          eval "$(supabase status -o env | grep -E '^(PUBLISHABLE_KEY|SECRET_KEY)=')"
          {
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${PUBLISHABLE_KEY}"
            echo "SUPABASE_ANON_KEY=${SECRET_KEY}"
            echo "SUPABASE_SERVICE_ROLE=${SECRET_KEY}"
          } >> "$GITHUB_ENV"

      - name: Wait for Supabase to be ready and run migrations
        run: pnpm w:db migrate:test

      - name: Run tests
        run: pnpm test
