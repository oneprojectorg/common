name: Tests

on:
  pull_request:

jobs:
  test:
    name: Tests
    runs-on: blacksmith-2vcpu-ubuntu-2204

    env:
      # Tiptap Pro registry authentication
      TIPTAP_PRO_TOKEN: ${{ secrets.TIPTAP_PRO_TOKEN }}
      # Supabase test instance environment variables (using local dev keys)
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:55321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_URL: http://127.0.0.1:55321
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      SUPABASE_SERVICE_ROLE: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:55322/postgres
      NEXT_PUBLIC_POSTHOG_KEY: test_posthog_key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Enable Corepack
        run: corepack enable

      - name: Install pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.71.0

      - name: Use CI config
        run: cp supabase/supabase-ci.toml supabase/config.toml

      - name: Pin Supabase Docker images from Docker Hub
        run: |
          # Blacksmith mirrors Docker pulls via SUPABASE_INTERNAL_IMAGE_REGISTRY=ghcr.io.
          # The ghcr.io mirror may serve stale/broken images. Pre-pull by digest
          # from Docker Hub and tag for ghcr.io so supabase start uses them.
          pin() { docker pull "supabase/$1@$2" && docker tag "supabase/$1@$2" "ghcr.io/supabase/$1"; }
          pin "gotrue:v2.184.0"     "sha256:c485010238ab429edf4ac8eb70b37b41aae0a0905277a935d4a0b64bb848e393"
          pin "postgres:17.6.1.067" "sha256:a05666de4398dcd9077cc8e2a76d712036d84356cf679d845193c38a187ed1fd"
          pin "kong:2.8.1"          "sha256:1b53405d8680a09d6f44494b7990bf7da2ea43f84a258c59717d4539abf09f6d"
          pin "realtime:v2.69.1"    "sha256:f38207af46fcf9a550d5b656aefb67bdf5963308b6825eec587c450e7835b5e9"
          pin "storage-api:v1.33.4" "sha256:cfea6cdfaf7ebf425175bc0dce449af5f323cb25d6be87a4873aa4a541b57505"

      - name: Start Supabase
        run: |
          echo "Starting Supabase with CI config..."
          supabase start
          echo "Supabase started successfully"

      - name: Check Supabase status
        run: supabase status

      - name: Wait for Supabase to be ready and run migrations
        run: pnpm w:db migrate:test

      - name: Run tests
        run: pnpm test
